name: CI - Build & Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - run: docker build -t zenew/task-backend:latest ./backend
    - run: docker push zenew/task-backend:latest

    - run: docker build -t zenew/task-frontend:latest ./frontend
    - run: docker push zenew/task-frontend:latest
